name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    # -------------------------------------------------------------------------
    # CodeQL is not yet active for this repository.
    #
    # To enable: replace this job's 'steps' block with the version below,
    # and set the languages that match your codebase.
    #
    # Supported languages:
    #   javascript, typescript, python, java, go, ruby, csharp, cpp, swift
    #
    # Example (uncomment and replace the steps block):
    #
    #   strategy:
    #     fail-fast: false
    #     matrix:
    #       language: [javascript, python]
    #
    #   steps:
    #     - uses: actions/checkout@v4
    #     - uses: github/codeql-action/init@v3
    #       with:
    #         languages: ${{ matrix.language }}
    #     - uses: github/codeql-action/autobuild@v3
    #     - uses: github/codeql-action/analyze@v3
    #       with:
    #         category: '/language:${{ matrix.language }}'
    # -------------------------------------------------------------------------

    steps:
      - name: CodeQL not yet configured
        run: |
          echo "CodeQL analysis is not yet active for this repository."
          echo "Add source languages to codeql.yml to enable it."
