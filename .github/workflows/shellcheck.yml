name: shellcheck

on:
  pull_request:
    paths:
      - '.claude/hooks/**'
      - '.githooks/**'
      - '.github/workflows/shellcheck.yml'
  push:
    branches: [main]
    paths:
      - '.claude/hooks/**'
      - '.githooks/**'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint Claude hooks
        run: shellcheck .claude/hooks/*.sh

      - name: Lint git hooks
        # .githooks/ contains a mix: pre-commit and commit-msg are bash; the LFS
        # shims (post-*, pre-push) are POSIX sh. Let shellcheck infer the shell
        # from each file's shebang — do not pass --shell.
        run: |
          for f in .githooks/*; do
            [ -f "$f" ] || continue
            shellcheck "$f"
          done
