name: shellcheck

on:
  pull_request:
    paths:
      - '.claude/hooks/**'
      - '.githooks/**'
      - '.github/workflows/shellcheck.yml'
  push:
    branches: [main]
    paths:
      - '.claude/hooks/**'
      - '.githooks/**'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint Claude hooks (bash)
        run: shellcheck --shell=bash .claude/hooks/*.sh

      - name: Lint git hooks (sh)
        # .githooks/* are POSIX sh (LFS shims + secret scanner). Lint as sh.
        run: |
          for f in .githooks/*; do
            [ -f "$f" ] || continue
            shellcheck --shell=sh "$f"
          done
