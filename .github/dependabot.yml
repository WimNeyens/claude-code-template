version: 2

updates:
  # Keep GitHub Actions up to date — always active.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # ── Package manager entries ──────────────────────────────────────────────────
  # Uncomment the block that matches your project's package manager.
  # Only one block should be active at a time; duplicate entries for the same
  # ecosystem will cause Dependabot to report a configuration error.
  #
  # npm / pnpm / yarn (JavaScript / TypeScript)
